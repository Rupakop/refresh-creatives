<button id="payBtn">Pay Now</button>
<script>
  const RAZORPAY_KEY_ID = "rzp_test_SuowFPYCk7AOQA"; // public key id (safe to expose)
  const API_BASE = "/api"; // if same origin via Vercel/Express; otherwise full URL

  async function createOrder(amountPaise) {
    const res = await fetch(`${API_BASE}/create-order`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: amountPaise, currency: "INR" })
    });
    return res.json(); // { orderId, amount, currency }
  }

  async function verifyPayment(data) {
    const res = await fetch(`${API_BASE}/verify-payment`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });
    return res.json(); // { ok: true/false }
  }

  document.getElementById("payBtn").addEventListener("click", async () => {
    // Example: build amount from selected product in your page
    // If you have price in rupees, multiply by 100:
    const amountPaise = 59900; // ₹599.00 -> 59900

    const { orderId, amount, currency, error } = await createOrder(amountPaise);
    if (error) { alert("Could not start payment"); return; }

    const options = {
      key: RAZORPAY_KEY_ID,
      amount: amount.toString(),
      currency,
      name: "Refresh Elixer",
      description: "Order Payment",
      order_id: orderId,
      theme: { color: "#3399cc" },
      handler: async function (response) {
        // response has: razorpay_payment_id, razorpay_order_id, razorpay_signature
        const result = await verifyPayment(response);
        if (result.ok) {
          // Success — mark order paid, show thank-you, redirect, etc.
          window.location.href = "/checkout.html?status=success";
        } else {
          alert("Payment signature verification failed");
        }
      },
      modal: {
        ondismiss: function () {
          console.log("Checkout closed");
        }
      },
      prefill: {
        name: "", email: "", contact: ""
      },
      notes: {
        // optional: add cart or user notes
      }
    };

    const rzp = new Razorpay(options);
    rzp.open();
  });
</script>
