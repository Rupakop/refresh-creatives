
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Checkout | Refresh Elixer</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body class="bg-black text-white min-h-screen">

<div class="max-w-4xl mx-auto p-6">

  <h1 class="text-3xl font-bold text-center mb-6">
    Checkout
  </h1>

  <!-- CART -->
  <div id="cartContainer" class="space-y-4"></div>

  <!-- TOTAL -->
  <div class="flex justify-between mt-6 text-lg font-semibold">
    <span>Total</span>
    <span>₹<span id="totalAmount">0</span></span>
  </div>

  <!-- CUSTOMER DETAILS -->
  <div class="mt-8 space-y-3">

    <input
      id="custName"
      type="text"
      placeholder="Full Name"
      class="w-full p-3 rounded text-black"
    />

    <input
      id="custPhone"
      type="text"
      placeholder="Phone Number"
      class="w-full p-3 rounded text-black"
    />

    <textarea
      id="custAddress"
      placeholder="Full Address"
      class="w-full p-3 rounded text-black"
    ></textarea>

  </div>

  <!-- BUTTON -->
  <button
    id="payBtn"
    class="w-full mt-6 bg-pink-600 hover:bg-pink-700 py-3 rounded text-lg font-bold"
  >
    Pay Now
  </button>

</div>

<script>

/* ================= CART ================= */

let cart =
  JSON.parse(localStorage.getItem("cart") || "[]");

function renderCart() {

  const container =
    document.getElementById("cartContainer");

  container.innerHTML = "";

  let total = 0;

  if (cart.length === 0) {

    container.innerHTML = `
      <p class="text-gray-400 text-center">
        Cart is empty
      </p>
    `;

    document.getElementById("totalAmount")
      .textContent = "0";

    return;
  }

  cart.forEach((item, index) => {

    const itemTotal =
      Number(item.price) * Number(item.qty);

    total += itemTotal;

    container.innerHTML += `

      <div class="bg-white/10 p-4 rounded flex justify-between items-center">

        <div>

          <h2 class="font-semibold">
            ${item.name}
          </h2>

          <p class="text-sm text-gray-300">
            ${item.size}ml × ${item.qty}
          </p>

        </div>

        <div class="text-right">

          <p>
            ₹${itemTotal}
          </p>

          <button
            onclick="removeItem(${index})"
            class="text-red-400 text-xs mt-1"
          >
            Remove
          </button>

        </div>

      </div>
    `;
  });

  document.getElementById("totalAmount")
    .textContent = total;
}

/* ================= REMOVE ITEM ================= */

function removeItem(index) {

  cart.splice(index, 1);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  renderCart();
}

/* ================= PAYMENT ================= */

document.getElementById("payBtn")
  .onclick = async function () {

  if (cart.length === 0) {
    alert("Cart is empty");
    return;
  }

  const name =
    document.getElementById("custName")
      .value.trim();

  const phone =
    document.getElementById("custPhone")
      .value.trim();

  const address =
    document.getElementById("custAddress")
      .value.trim();

  if (!name || !phone || !address) {

    alert("Fill all details");

    return;
  }

  const amount = cart.reduce(
    (sum, item) =>
      sum +
      (Number(item.price) * Number(item.qty)),
    0
  );

  try {

    /* CREATE ORDER */

    const response = await fetch(
      "/api/createOrder",
      {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          amount: amount
        })
      }
    );

    const order =
      await response.json();

    console.log(order);

    if (!order.id) {

      alert("Order creation failed");

      return;
    }

    /* RAZORPAY */

    const options = {

      key: "rzp_test_SuowFPYCk7AOQA",

      amount: order.amount,

      currency: order.currency,

      name: "Refresh Elixer",

      description: "Perfume Purchase",

      order_id: order.id,

      handler: async function (response) {

        const verifyResponse = await fetch(
          "/api/verifyPayment",
          {

            method: "POST",

            headers: {
              "Content-Type": "application/json"
            },

            body: JSON.stringify({

              razorpay_order_id:
                response.razorpay_order_id,

              razorpay_payment_id:
                response.razorpay_payment_id,

              razorpay_signature:
                response.razorpay_signature
            })
          }
        );

        const data =
          await verifyResponse.json();

        if (data.success) {

          alert("Payment Successful");

          localStorage.removeItem("cart");

          window.location.href =
            "/index.html";

        } else {

          alert("Payment Verification Failed");
        }
      },

      prefill: {
        name: name,
        contact: phone
      },

      theme: {
        color: "#db2777"
      }
    };

    const razorpay =
      new Razorpay(options);

    razorpay.open();

  } catch (error) {

    console.log(error);

    alert("Something went wrong");
  }
};

/* ================= INIT ================= */

renderCart();

</script>

</body>
</html>
```
